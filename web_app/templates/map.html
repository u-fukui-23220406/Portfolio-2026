{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<div class="container-fluid px-0">
    <div class="d-flex justify-content-between align-items-center mb-2 px-3">
        <h2 class="h4 mb-0 fw-bold">🗺️ 福井県 全体マップ</h2>
        <a href="/" class="btn btn-outline-dark">✖ 閉じる</a>
    </div>

    <!-- 地図エリア: 画面の高さいっぱいに表示 -->
    <div id="bigmap" style="height: 85vh; width: 100%; border: 1px solid #ddd;"></div>
    
    <div class="text-center mt-2 small text-muted">
        <span class="me-3">📍 観光地 (青ピン)</span>
        <span>🟠 グルメ (オレンジ丸)</span>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 福井県全体が見えるくらいのズームで初期化
    var map = L.map('bigmap').setView([36.064, 136.220], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OSM contributors'
    }).addTo(map);

    // 1. 観光地のピン (標準マーカー)
    {% for spot in spots %}
        L.marker([{{ spot.lat }}, {{ spot.lng }}])
         .addTo(map)
         .bindPopup(`
            <div style="text-align:center;">
                <b style="color:#007bff;">{{ spot.name }}</b><br>
                <span style="font-size:0.8em; color:gray;">{{ spot.category }}</span><br>
                <a href="/spot/{{ spot.id }}" class="btn btn-primary btn-sm mt-1 text-white">詳細へ</a>
            </div>
         `);
    {% endfor %}

    // 2. グルメのピン (オレンジ色の円マーカー)
    {% for food in gourmets %}
        L.circleMarker([{{ food.lat }}, {{ food.lng }}], {
            color: 'orange',
            fillColor: '#f0ad4e',
            fillOpacity: 0.8,
            radius: 8
        })
         .addTo(map)
         .bindPopup(`
            <div style="text-align:center;">
                <b style="color:#d35400;">{{ food.name }}</b><br>
                <span style="font-size:0.8em; color:gray;">{{ food.category }}</span><br>
                <a href="/gourmet/{{ food.id }}" class="btn btn-warning btn-sm mt-1 text-dark">詳細へ</a>
            </div>
         `);
    {% endfor %}
</script>
{% endblock %}
